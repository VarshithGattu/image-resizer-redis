<!DOCTYPE html>
<html>
<head>
    <title>Image Resizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>📸 Image Resizer Queue</h1>
        
        <form method="POST" enctype="multipart/form-data">
            
            <label for="width">Target Width (px):</label>
            <input type="number" id="width" name="width" value="400" required>

            <label for="height">Target Height (px):</label>
            <input type="number" id="height" name="height" value="300" required>

            <label for="file" class="file-label">Choose Image (PNG/JPG)</label>
            <input type="file" id="file" name="file" required style="display: none;">
            
            <button type="submit">Enqueue Resize Job</button>
        </form>
    </div>
</body>
</html>
